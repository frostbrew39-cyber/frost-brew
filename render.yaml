# Render Blueprint — API (Express + Socket.IO)
# https://render.com/docs/blueprint-spec
#
# Deploy: Dashboard → New → Blueprint → connect this repo, or `render blueprint apply`.
# Set JWT_SECRET in the Render dashboard (Environment) if you use sync: false below.

services:
  - type: web
    name: frost-brew-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      # Comma-separated: your Vercel production URL (and previews if needed). Required for browser CORS + Socket.IO.
      - key: FRONTEND_URL
        sync: false
